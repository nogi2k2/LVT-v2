[DEFAULT]
dpi = 300

# Debugging and I/O
store_debug_images = True
debug_image_dir = output/converted_images
store_preprocessor_single = True

[PREPROCESSING]
# General preprocessing options
enable_clahe = True
clahe_clip_limit = 2.0
clahe_tile_grid_size = 8

# Denoising
enable_denoise = True
denoise_h = 8
denoise_template_window = 7
denoise_search_window = 21

# Edge enhancement (applied after CLAHE/denoising)
enable_sharpening = True
sharpening_method = unsharp_mask
unsharp_radius = 1.0
unsharp_amount = 0.5
unsharp_threshold = 0
laplacian_kernel_size = 3

# Additional preprocessing
enable_median_blur = True
median_kernel_size = 3
target_max_side = 1200


[DBSCAN]
# DBSCAN clustering parameters used to generate candidate bounding boxes from
# the binary image produced by the preprocessor.
# eps: neighborhood radius (in pixels)
dbscan_eps = 5.0
# min_samples: min samples in a neighborhood to form a core point
dbscan_min_samples = 8
# min_area: minimum bounding box area (w*h) for a candidate
dbscan_min_area = 16

# Allow overriding the closing kernel size applied before DBSCAN
closing_ksize = 15

# Optional SIFT-based candidate clustering (alternative to binary dilation+DBSCAN)
# If enabled, the pipeline will perform SIFT matching between each reference icon
# and the full label image, draw match points, then cluster those points via
# the same DBSCAN/contour clustering to produce candidate boxes.
# Enable optional SIFT-based candidate clustering (alternative to DBSCAN on binary mask)
# When true, the controller will run SIFT matching per-icon and cluster matched points to form candidates.
sift_candidate_clustering = True
# Lowe ratio for SIFT matches (0.0..1.0)
sift_ratio = 0.6
# Minimum number of good matches required to attempt clustering
sift_min_matches = 4
# When creating a point mask for clustering, draw small circles of this radius
sift_point_radius = 6
# Save additional SIFT debug overlays when store_debug_images=True
sift_debug_draw = True


[EMBEDDINGS]
# Embedding similarity options (used as an early filter before verifier)
# embedding_sim_threshold: if >0, a candidate with similarity < threshold is rejected
embedding_sim_threshold = 0.0
# Use pytorch/mobileNet based embedder when available (True/False)
use_mobilenet_embedder = True

# SigLIP configuration
siglip_model_name = siglip-base-p16-224
siglip_device = cpu

# Embedding score weighting (should sum to 1.0)
sim_weight = 0.5
siglip_weight = 0.5
 
# Prefilter and decision thresholds
# Candidates with SIM <= sim_prefilter_threshold will be filtered out before
# SigLIP + pattern scoring. Default is 0.6 as requested.
sim_prefilter_threshold = 0.6
# Decision thresholds used for final Pass/Fail determination. When SigLIP is
# available the SigLIP threshold is used; otherwise the SIM threshold is used.
siglip_decision_threshold = 0.81
sim_decision_threshold = 0.81


[VALIDATION]
# Minimum bounding box area used downstream (safety net)
min_bbox_area = 16


[ROTATION]
# Rotation-based augmentation: when all candidate SIMs for an icon/page are
# below `rotation_trigger_threshold`, rotated variants (90/180/270) of each
# candidate are generated and their SIM/SigLIP scores are evaluated. The
# candidate's sim/siglip values are replaced with the highest value among
# the original and rotated variants.
# Enable or disable this behavior
rotation_augmentation_enabled = True
# Threshold (0..1) which triggers augmentation when max candidate SIM < value
rotation_trigger_threshold = 0.81
# Max candidates per icon/page to augment (performance cap)
rotation_max_candidates = 10
# Skip augmentation for very small crops (w*h < rotation_min_area)
rotation_min_area = 10