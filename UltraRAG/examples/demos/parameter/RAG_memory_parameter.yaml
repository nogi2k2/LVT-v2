benchmark:
  benchmark:
    name: nq
    path: data/chat_sessions/RAG_memory_1772248229205.jsonl
    key_map:
      q_ls: question
      gt_ls: golden_answers
    shuffle: false
    seed: 42
    limit: -1
memory:
  user_id: default
retriever:
  model_name_or_path: openbmb/MiniCPM-Embedding-Light
  backend_configs:
    infinity:
      bettertransformer: false
      pooling_method: auto
      model_warmup: false
      trust_remote_code: true
    sentence_transformers:
      trust_remote_code: true
      sentence_transformers_encode:
        normalize_embeddings: false
        encode_chunk_size: 256
        q_prompt_name: query
        psg_prompt_name: document
        psg_task: null
        q_task: null
    openai:
      model_name: qwen-embedding
      base_url: http://localhost:65504/v1
      api_key: abc
      concurrency: 8
    bm25:
      lang: en
      save_path: index/bm25
  batch_size: 16
  corpus_path: data/corpus_example.jsonl
  gpu_ids: '1'
  is_multimodal: false
  backend: openai
  index_backend: faiss
  index_backend_configs:
    faiss:
      index_use_gpu: true
      index_chunk_size: 10000
      index_path: index/index.index
    milvus:
      uri: index/milvus_demo.db
      token: null
      id_field_name: id
      vector_field_name: vector
      text_field_name: contents
      id_max_length: 64
      text_max_length: 60000
      metric_type: IP
      index_params:
        index_type: AUTOINDEX
        metric_type: IP
      search_params:
        metric_type: IP
        params: {}
      index_chunk_size: 1000
  is_demo: false
  collection_name: wiki
  top_k: 5
  query_instruction: 'Query: '
generation:
  backend: openai
  backend_configs:
    hf:
      batch_size: 8
      gpu_ids: 2,3
      model_name_or_path: openbmb/MiniCPM4-8B
      trust_remote_code: true
    openai:
      api_key: abc
      base_delay: 1
      base_url: http://localhost:65503/v1
      concurrency: 8
      model_name: qwen3-32b
      retries: 3
    vllm:
      dtype: auto
      gpu_ids: 2,3
      gpu_memory_utilization: 0.9
      model_name_or_path: openbmb/MiniCPM4-8B
      trust_remote_code: true
  extra_params:
    chat_template_kwargs:
      enable_thinking: false
  sampling_params:
    max_tokens: 2048
    temperature: 0.7
    top_p: 0.8
  system_prompt: 请记住，你是一个专业的UltraRAG问答助手。请一定记住使用中文回答问题。
custom: {}
prompt:
  template: prompt/qa_rag_with_memory.jinja
